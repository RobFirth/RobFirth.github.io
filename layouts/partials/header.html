<header>
  <nav aria-label="Main navigation">
    <a href="/" class="site-name">{{ .Site.Title }}</a>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>
